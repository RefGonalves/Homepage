<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        @import "https://www.nerdfonts.com/assets/css/webfont.css";
    </style>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/src/Corinthians.ico">
</head>
<body>
    <header>
        <div id="cool-pics"><img src="src/capy-funny2.gif" alt="cool-pic"></div>        
        <div id="phrase">
            <p>
                Confia, que cê consegue.
            </p>
            
        </div>
        <div id="header-text">
            <h1 id="time">17:00</h1>
            <div id="day">quarta-feira, 14 de fevereiro de 2004</div>
        </div>
    </header>
    <main>
        <div class="links">

            <div class="button-box">
                <a title="Notion" class="link-button" id="notion" href="https://www.notion.so/">
                    <i class="nf nf-dev-notion"></i> Notion
                </a>
            </div>
            <div class="button-box">
                <a title="Trello" class="link-button" id="trello" href="https://trello.com/">
                    <i class="nf nf-fa-trello"></i> Trello
                </a>
            </div>
            <div class="button-box">
                <a title="Google Drive" class="link-button" id="drive" href="https://drive.google.com/drive/u/0/my-drive">
                    <i class="nf nf-fa-google_drive"></i> Google Drive
                </a>
            </div>
            <div class="button-box">
                <a title="Google Fonts" class="link-button" id="fonts" href="https://fonts.google.com/">
                    <i class="nf nf-fa-font"></i> Google Fonts
                </a>
            </div>
            <div class="button-box">
                <a title="Gmail" class="link-button" id="gmail" href="https://mail.google.com/mail/u/0/#inbox">
                    <i class="nf nf-md-gmail"></i> Gmail
                </a>
            </div>
            <div class="button-box">
                <a title="Whatsapp" class="link-button" id="whatsapp" href="https://web.whatsapp.com/">
                    <i class="nf nf-fa-whatsapp"></i> Whatsapp
                </a>
            </div>
            <div class="button-box">
                <a title="Youtube" class="link-button" id="youtube" href="https://youtube.com/">
                    <i class="nf nf-fa-youtube"></i> Youtube
                </a>
            </div>
            <div class="button-box">
                <a title="Pinterest" class="link-button" id="pinterest" href="https://br.pinterest.com/">
                    <i class="nf nf-fa-pinterest"></i> Pinterest
                </a>
            </div>
            <div class="button-box">
                <a title="Github" class="link-button" id="github" href="https://github.com/">
                    <i class="nf nf-fa-github"></i> Github
                </a>
            </div>
            <div class="button-box">
                <a title="Nerdfonts" class="link-button" id="nerdfonts" href="https://nerdfonts.com/">
                    <i class="nf nf-md-glasses"></i> Nerdfonts
                </a>
            </div>
            <div class="button-box">
                <a title="Gemini" class="link-button" id="gemini" href="https://gemini.google.com/">
                    <i class="nf nf-md-chat_question"></i> Gemini
                </a>
            </div>
            <div class="button-box">
                <a title="Cobalto" class="link-button" id="cobalto" href="https://cobalto.ufpel.edu.br/">
                    <i class="nf nf-md-molecule_co"></i> Cobalto
                </a>
            </div>
            <div class="button-box">
                <a title="Itch UFPel" class="link-button" id="itchpel" href="https://jogosufpel.itch.io/">
                    <i class="nf nf-fa-itch_io"></i> Itch UFPel
                </a>
            </div>
            <div class="button-box">
                <a title="HoYoLab" class="link-button" id="hoyolab" href="https://act.hoyolab.com/app/community-game-records-sea/index.html?bbs_presentation_style=fullscreen&bbs_auth_required=true&gid=2&user_id=76855560&utm_source=share&utm_medium=link&lang=pt-pt&bbs_theme=dark&bbs_theme_device=1&utm_campaign=web#/ys">
                    <i class="nf nf-fa-gamepad"></i> HoYoLab
                </a>
            </div>
        </div>
    </main>
    <script type="text/javascript" src="script.js" defer></script>
</body>
</html>
